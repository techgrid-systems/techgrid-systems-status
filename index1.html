<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGrid Systems | Enterprise Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .panel-header { background-color: #0f172a; color: white; }
        .details-panel { transition: max-height 0.3s ease-out; overflow: hidden; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-white border-b border-slate-200">
        <nav class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 font-bold text-xl">
                <span class="text-slate-900">TechGrid</span><span class="text-blue-600">Status</span>
            </div>
            <div class="hidden md:flex gap-6 text-sm text-slate-500 font-medium">
                <a href="#" class="hover:text-blue-600">Report Issues</a>
                <a href="#" class="hover:text-blue-600">Uptime</a>
                <a href="#" class="hover:text-blue-600" onclick="document.getElementById('subscribe-modal').classList.remove('hidden')">Subscribe</a>
                <a href="#" class="text-blue-600 font-bold">Login</a>
            </div>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="panel-header px-4 py-3 font-bold text-sm">Recent Uptime</div>
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr><th class="p-3">Day</th><th class="p-3">Date</th><th class="p-3">Uptime</th></tr>
                    </thead>
                    <tbody id="uptime-body"></tbody>
                </table>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="panel-header px-4 py-3 font-bold text-sm">Service Status</div>
                <div id="service-status-list" class="divide-y divide-slate-100"></div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-8 flex flex-wrap gap-6 justify-center text-xs text-slate-500">
            <div class="flex items-center gap-2"><i class="fas fa-check-circle text-emerald-500"></i> Normal</div>
            <div class="flex items-center gap-2"><i class="fas fa-exclamation-triangle text-red-500"></i> Unavailable</div>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
            <div class="panel-header px-4 py-3 font-bold text-sm flex justify-between">
                History Grid <span><i class="fas fa-chevron-up"></i></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-center">
                    <thead class="bg-slate-50 text-slate-500 border-b border-slate-200" id="history-header"></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="subscribe-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full">
            <h3 class="font-bold mb-4">Subscribe to Updates</h3>
            <input type="email" placeholder="Email address" class="w-full p-2 border rounded mb-4">
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full bg-blue-600 text-white py-2 rounded">Subscribe</button>
        </div>
    </div>

    <script>
        const allNodes = [
            { id: 0, name: 'Main Website', url: 'https://www.techgrid-systems.org.uk' },
            { id: 1, name: 'CPanel Website', url: 'https://tgs-cpanel.techgrid-systems.org.uk' },
            { id: 2, name: 'Helpdesk Website', url: 'https://helpdesk.techgrid-systems.org.uk' },
            { id: 3, name: 'Support Portal', url: 'https://support.techgrid-systems.org.uk' },
            { id: 4, name: 'End User Portal', url: 'https://portal.techgrid-systems.org.uk' },
            { id: 5, name: 'Global Domain (.org.uk)', url: 'https://techgrid-systems.org.uk' },
            { id: 6, name: 'Status Portal', url: 'https://status.techgrid-systems.org.uk' },
            { id: 7, name: 'AI Portal', url: 'https://ai.techgrid-systems.org.uk' },
            { id: 8, name: 'SharePoint Portal', url: 'https://sharepoint.techgrid-systems.org.uk' },
            { id: 9, name: 'Training Portal', url: 'https://power-automate-training.techgrid-systems.org.uk' },
            { id: 10, name: 'Core Node - London', url: 'https://techgrid-systems.org.uk' },
            { id: 11, name: 'Core Server (DC-01)', url: 'https://TGS-DC-01.techgrid-systems.org.uk' },
            { id: 12, name: 'Primary FTP Server', url: 'https://ftp.techgrid-systems.org.uk' }
        ];

        function toggleDetails(id) {
            const el = document.getElementById(`details-${id}`);
            el.style.maxHeight = el.style.maxHeight ? null : el.scrollHeight + "px";
        }

        async function updateDashboard() {
            for(let n of allNodes) {
                try {
                    await fetch(n.url, { mode: 'no-cors' });
                    n.status = 'normal';
                } catch { n.status = 'unavailable'; }
            }

            document.getElementById('service-status-list').innerHTML = allNodes.map(n => `
                <div>
                    <div class="p-3 flex justify-between items-center text-sm cursor-pointer hover:bg-slate-50" onclick="toggleDetails(${n.id})">
                        <span class="font-medium text-slate-700 underline text-blue-600">${n.name}</span>
                        <span class="${n.status === 'normal' ? 'text-emerald-500' : 'text-red-500'} font-bold uppercase text-[10px]">
                            ${n.status} <i class="fas fa-${n.status === 'normal' ? 'check-circle' : 'times-circle'} ml-1"></i>
                        </span>
                    </div>
                    <div id="details-${n.id}" class="details-panel max-h-0 bg-slate-50 px-4 py-0 border-b border-slate-100 text-[11px] text-slate-500 font-mono">
                        Monitored Endpoint: <a href="${n.url}" target="_blank" class="text-blue-500">${n.url}</a>
                    </div>
                </div>
            `).join('');

            const today = new Date();
            document.getElementById('uptime-body').innerHTML = [0,1,2,3,4].map(i => {
                const d = new Date(); d.setDate(today.getDate() - i);
                return `<tr><td class="p-3">${d.toLocaleDateString('en-US', {weekday: 'long'})}</td><td class="p-3">${d.toLocaleDateString()}</td><td class="p-3">100.00%</td></tr>`;
            }).join('');

            const dates = [0,1,2,3,4,5,6].map(i => {
                const d = new Date(); d.setDate(today.getDate() - i);
                return d.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
            });
            document.getElementById('history-header').innerHTML = `<tr class="text-left"><th class="p-3">Service</th>` + dates.map(d => `<th class="p-3 text-center">${d}</th>`).join('') + `</tr>`;
            document.getElementById('history-body').innerHTML = allNodes.map(n => `
                <tr class="border-b border-slate-50">
                    <td class="p-3 font-medium text-slate-700">${n.name}</td>
                    ${dates.map(() => `<td class="p-3 text-center ${n.status === 'normal' ? 'text-emerald-500' : 'text-red-500'}"><i class="fas fa-${n.status === 'normal' ? 'check-circle' : 'times-circle'}"></i></td>`).join('')}
                </tr>
            `).join('');
        }

        updateDashboard();
    </script>
</body>
</html>
