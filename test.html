<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGrid Systems | Enterprise Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1e293b; }
        .panel-header { background-color: #0f172a; color: white; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <nav class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 font-bold text-2xl tracking-tight">
                <!-- Logo with error handling: if it fails to load, it hides itself -->
                <img 
                    src="https://techgrid-systems.github.io/techgrid-systems-logo/tgs.jpg" 
                    alt="TechGrid Systems Logo" 
                    class="h-9 w-9 object-contain" 
                    onerror="this.style.display='none'">
                <div>
                    <span class="text-slate-900">techgrid</span><span class="text-blue-600">status</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="mb-6 flex justify-between items-end">
            <h1 class="text-2xl font-bold text-slate-800">System Performance</h1>
            <div class="text-[11px] font-mono text-slate-400 bg-slate-100 px-2 py-1 rounded" id="last-updated">Initializing...</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="bg-white rounded shadow-md border border-slate-200 overflow-hidden">
                <div class="panel-header px-5 py-3 font-bold text-sm">Service Status</div>
                <div id="service-status-list" class="divide-y divide-slate-100 p-2"></div>
            </div>
            
            <div class="bg-white rounded shadow-md border border-slate-200 overflow-hidden">
                <div class="panel-header px-5 py-3 font-bold text-sm">Status Legend</div>
                <div class="p-6 text-sm text-slate-600 space-y-3">
                    <p><span class="inline-block w-4 h-4 bg-emerald-500 rounded mr-2"></span> <b>UP</b>: Service is operational.</p>
                    <p><span class="inline-block w-4 h-4 bg-red-500 rounded mr-2"></span> <b>DOWN</b>: Service is unreachable.</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded shadow-md border border-slate-200 overflow-hidden mb-20">
            <div class="panel-header px-5 py-3 font-bold text-sm">7-Day History</div>
            <div class="overflow-x-auto">
                <table class="w-full text-[13px]">
                    <thead class="bg-slate-50 text-slate-400 border-b border-slate-100" id="history-header"></thead>
                    <tbody id="history-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const allNodes = [
            { id: 0, name: 'Main Website', url: 'https://www.techgrid-systems.org.uk', icon: 'globe' },
            { id: 1, name: 'CPanel Website', url: 'https://tgs-cpanel.techgrid-systems.org.uk', icon: 'server' },
            { id: 2, name: 'Helpdesk Website', url: 'https://helpdesk.techgrid-systems.org.uk', icon: 'headset' },
            { id: 3, name: 'Support Portal', url: 'https://support.techgrid-systems.org.uk', icon: 'life-ring' },
            { id: 4, name: 'End User Portal', url: 'https://portal.techgrid-systems.org.uk', icon: 'user-circle' },
            { id: 5, name: 'Global Domain (.org.uk)', url: 'https://techgrid-systems.org.uk', icon: 'link' },
            { id: 6, name: 'Status Portal', url: 'https://status.techgrid-systems.org.uk', icon: 'signal' },
            { id: 7, name: 'AI Portal', url: 'https://ai.techgrid-systems.org.uk', icon: 'robot' },
            { id: 8, name: 'SharePoint Portal', url: 'https://sharepoint.techgrid-systems.org.uk', icon: 'folder-open' },
            { id: 9, name: 'Training Portal', url: 'https://power-automate-training.techgrid-systems.org.uk', icon: 'graduation-cap' },
            { id: 10, name: 'Core Node - London', url: 'https://techgrid-systems.org.uk', icon: 'city' },
            { id: 11, name: 'Core Server (DC-01)', url: 'https://TGS-DC-01.techgrid-systems.org.uk', icon: 'database' },
            { id: 12, name: 'Primary FTP Server', url: 'https://ftp.techgrid-systems.org.uk', icon: 'file-import' }
        ];

        const historyData = {
            "2026-07-06": { 4: 'down', 11: 'down' },
            "2026-07-05": { 0: 'down' },
        };

        async function updateDashboard() {
            for(let n of allNodes) {
                try {
                    await fetch(n.url, { mode: 'no-cors' });
                    n.status = 'up';
                } catch {
                    n.status = 'down';
                }
            }

            document.getElementById('service-status-list').innerHTML = allNodes.map(n => `
                <div class="p-4 flex justify-between items-center">
                    <span class="font-medium text-slate-700 truncate mr-4"><i class="fas fa-${n.icon} mr-2"></i> ${n.name}</span>
                    ${n.status === 'up' ? '<span class="text-emerald-500 font-bold text-[11px] bg-emerald-100 px-2 py-1 rounded">UP</span>' : 
                      '<span class="text-red-500 font-bold text-[11px] bg-red-100 px-2 py-1 rounded">DOWN</span>'}
                </div>
            `).join('');

            const last7Days = [0,1,2,3,4,5,6].map(i => {
                const d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            });

            document.getElementById('history-header').innerHTML = `<tr class="text-left text-[11px] uppercase tracking-wider"><th class="p-5 font-semibold text-slate-500">Service</th>` + 
                last7Days.map(d => `<th class="p-5 text-center">${d.split('-')[2]}</th>`).join('') + `</tr>`;

            document.getElementById('history-body').innerHTML = allNodes.map(n => `
                <tr><td class="p-5 font-semibold text-[13px] truncate">${n.name}</td>${last7Days.map(date => {
                    const status = historyData[date] ? historyData[date][n.id] : null;
                    return `<td class="p-5 text-center">${status ? (status === 'down' ? '❌' : '✅') : '✅'}</td>`;
                }).join('')}</tr>
            `).join('');

            document.getElementById('last-updated').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
        }

        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
