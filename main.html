<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .panel-header { background-color: #0f172a; color: white; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="p-10">

    <main class="max-w-4xl mx-auto">
        <div class="bg-white rounded shadow-md border border-slate-200 overflow-hidden">
            <div class="panel-header px-5 py-3 font-bold text-sm">Simulation: Live Status</div>
            <div id="sim-status-list" class="divide-y divide-slate-100 p-2"></div>
        </div>
        <p class="text-xs text-slate-400 mt-4 italic">* This is a simulation. Statuses randomize every 5 seconds.</p>
    </main>

    <script>
        const nodes = [
            { name: 'Web Server', icon: 'globe' },
            { name: 'Database Node', icon: 'database' },
            { name: 'API Gateway', icon: 'server' },
            { name: 'Auth Service', icon: 'key' }
        ];

        function runSimulation() {
            const list = document.getElementById('sim-status-list');
            list.innerHTML = nodes.map(n => {
                // Randomly decide if it's up or down
                const isUp = Math.random() > 0.3; 
                return `
                    <div class="p-4 flex justify-between items-center">
                        <span class="text-slate-700"><i class="fas fa-${n.icon} mr-2"></i> ${n.name}</span>
                        <span class="${isUp ? 'text-emerald-500 bg-emerald-100' : 'text-red-500 bg-red-100'} font-bold text-[11px] px-2 py-1 rounded">
                            ${isUp ? 'UP' : 'DOWN'}
                        </span>
                    </div>
                `;
            }).join('');
        }

        // Update every 5 seconds for demo purposes
        runSimulation();
        setInterval(runSimulation, 5000);
    </script>
</body>
</html>
